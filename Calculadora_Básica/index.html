<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Calculadora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="calculadora"><center>
    <h1>Minha Calculadora</h1>
    Primeiro número<br>
    <input type="number" id="n1"><br>
    Segundo Número<br>
    <input type="number" id="n2"><br><br>
    
    <label for="opcoes">Opções de cálculos:</label>
    <select name="opcoes" id="opcoes">
        <option value="operacoesBasicas">Operações Básicas</option>
        <option value="area">Operações de área</option>
        <option value="venda">Operações de venda</option>
    </select><br><br><br>

    <button onclick="somar()" id="soma">Somar</button>
    <button onclick="subtrair()" id="subtrair">Subtrair</button>
    <button onclick="multiplicar()" id="multiplicar">Multiplicar</button>
    <button onclick="dividir()" id="dividir">Dividir</button>
    <button onclick="parImpar()" id="parImpar">Verificar se é par ou ímpar</button>
    <button onclick="areaTriangulo()" id="areaTriangulo">Área do triângulo</button>
    <button onclick="areaQuadrado()" id="areaQuadrado">Área do quadrado</button>
    <button onclick="menos10Porcento()" id="menos10Porcento">Retirar 10% do primeiro número</button>
    <button onclick="menos3Porcento()" id="menos3Porcento">Retirar 3% do primeiro número</button>
    <button onclick="lucro15Porcento()" id="lucro15Porcento">Adicionar 15% do valor do primeiro número</button>
    <button onclick="venda()" id="venda">Calcular valor para venda</button>
    <br><br>
    O resultado é: <span id="resultado"></span>
</div></center>

    <footer><center>
        <br><br>&copy; Feito por Leonardo Lima de Freitas
    </center></footer>

    <script src="js/calculo.js"></script>
    <link rel="stylesheet" href="css/style.css">
</body>
</html>
